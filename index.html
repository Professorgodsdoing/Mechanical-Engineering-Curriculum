<style>

    --blueprint:#1a3c5e;
    --blueprint-dark:#0f2740;
    --blueprint-darker:#0a1c30;
    --line:#bcd9f0;
    --line-dim:#7fa8c9;
    --white:#eaf4ff;
    --brass:#c9a24b;
    --brass-dark:#a9822f;
    --success:#6fcf97;
    --error:#e0847a;
    --paper:#f4f8fb;
    --ink:#12293f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(0deg, rgba(234,244,255,0.05) 0px, rgba(234,244,255,0.05) 1px, transparent 1px, transparent 28px),
      repeating-linear-gradient(90deg, rgba(234,244,255,0.05) 0px, rgba(234,244,255,0.05) 1px, transparent 1px, transparent 28px),
      linear-gradient(160deg, var(--blueprint) 0%, var(--blueprint-dark) 60%, var(--blueprint-darker) 100%);

    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    min-height:100vh;
    line-height:1.5;
    -webkit-tap-highlight-color:transparent;
  }
  header{
    padding:22px 18px 14px;
    border-bottom:2px solid var(--line-dim);
    position:sticky;top:0;
    background:linear-gradient(160deg, var(--blueprint) 0%, var(--blueprint-dark) 100%);
    z-index:20;
  }
  .titleblock{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap;}
  h1{
    font-family:Georgia,"Times New Roman",serif;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-size:1.05rem;
    margin:0 0 4px;
    color:var(--white);
  }
  .subtitle{font-size:0.75rem;color:var(--line-dim);letter-spacing:0.4px;}
  .gauge-wrap{display:flex;align-items:center;gap:12px;}
  .dial{

    background:conic-gradient(var(--brass) calc(var(--pct,0)*1%), rgba(234,244,255,0.12) 0);
    display:flex;align-items:center;justify-content:center;
    position:relative;
    border:2px solid var(--line-dim);
  }
  .dial::before{
    content:"";position:absolute;inset:6px;border-radius:50%;
    background:var(--blueprint-dark);border:1px solid rgba(234,244,255,0.2);
  }
  .dial span{position:relative;z-index:2;font-family:Georgia,serif;font-size:0.9rem;font-weight:bold;color:var(--brass);}
  .rank-seal{
    border:2px solid var(--brass);border-radius:50%;
    width:50px;height:50px;
    display:flex;align-items:center;justify-content:center;text-align:center;
    font-family:Georgia,serif;font-size:0.52rem;letter-spacing:0.4px;text-transform:uppercase;
    color:var(--brass);padding:4px;transform:rotate(-8deg);flex-shrink:0;
  }
  .rank-seal.bump{animation:stamp 0.5s ease;}
  @keyframes stamp{
    0%{transform:rotate(-8deg) scale(1.6);opacity:0;}
    60%{transform:rotate(-8deg) scale(0.95);opacity:1;}
    100%{transform:rotate(-8deg) scale(1);}
  }
  .catbar{
    display:flex;gap:6px;overflow-x:auto;padding:10px 18px 0;
    background:rgba(10,28,48,0.5);
  }
  .catbar button{
    flex-shrink:0;background:transparent;border:1px solid rgba(234,244,255,0.25);
    color:var(--line-dim);padding:5px 10px;border-radius:12px;font-size:0.65rem;
    letter-spacing:0.3px;cursor:pointer;text-transform:uppercase;
  }
  .catbar button.activeCat{background:rgba(201,162,75,0.2);border-color:var(--brass);color:var(--brass);}
  nav{
    display:flex;gap:8px;overflow-x:auto;padding:10px 18px 12px;
    background:rgba(10,28,48,0.5);border-bottom:1px solid rgba(234,244,255,0.15);
  }
  nav button{
    flex-shrink:0;background:transparent;border:1px solid var(--line-dim);color:var(--line);
    padding:7px 12px;border-radius:3px;font-size:0.7rem;letter-spacing:0.2px;cursor:pointer;white-space:nowrap;
  }

  nav button.done::after{content:" ✓";color:var(--success);}
  nav button.active.done::after{color:var(--blueprint-darker);}
  main{max-width:720px;margin:0 auto;padding:20px 18px 60px;}
  .module{display:none;}
  .module.active{display:block;animation:fade 0.25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .module h2{font-family:Georgia,serif;font-size:1.2rem;border-bottom:2px solid var(--brass);padding-bottom:8px;margin-bottom:4px;}
  .module .tag{font-size:0.66rem;color:var(--brass);letter-spacing:1px;text-transform:uppercase;}
  .concept{background:rgba(234,244,255,0.06);border-left:3px solid var(--brass);padding:12px 14px;margin:14px 0;font-size:0.94rem;}
  .concept b{color:var(--brass);}
  .example{background:var(--paper);color:var(--ink);border-radius:4px;padding:14px 16px;margin:14px 0;font-size:0.9rem;}
  .example .label{font-size:0.66rem;text-transform:uppercase;letter-spacing:1px;color:var(--blueprint);font-weight:bold;margin-bottom:6px;}
  .example .math{font-family:"Courier New",Courier,monospace;background:#e2ecf4;padding:8px 10px;border-radius:3px;display:block;margin:6px 0;}
  canvas.plot{width:100%;max-width:100%;height:auto;background:var(--paper);border-radius:4px;margin:10px 0;display:block;}
  .why{font-size:0.8rem;color:var(--line-dim);margin-top:8px;font-style:italic;}
  .exercise{border:1px solid rgba(234,244,255,0.25);border-radius:5px;padding:14px;margin:16px 0;background:rgba(10,28,48,0.35);}
  .exercise .q{font-size:0.9rem;margin-bottom:10px;}
  .exercise input[type=text]{
    background:var(--paper);color:var(--ink);border:1px solid var(--line-dim);border-radius:3px;
    padding:8px 10px;font-size:0.95rem;width:140px;font-family:"Courier New",monospace;
  }
  .opt-btn{
    display:block;width:100%;text-align:left;background:rgba(234,244,255,0.08);
    border:1px solid var(--line-dim);color:var(--white);padding:9px 12px;border-radius:3px;
    margin-bottom:6px;font-size:0.86rem;cursor:pointer;
  }
  .opt-btn:active{background:rgba(234,244,255,0.18);}
  .submit-btn{background:var(--brass);color:var(--blueprint-darker);border:none;border-radius:3px;
    padding:8px 16px;font-weight:bold;font-size:0.85rem;cursor:pointer;margin-left:8px;}
  .feedback{margin-top:10px;padding:8px 10px;border-radius:3px;font-size:0.84rem;display:none;}
  .feedback.correct{background:rgba(111,207,151,0.15);border:1px solid var(--success);color:var(--success);display:block;}
  .feedback.incorrect{background:rgba(224,132,122,0.15);border:1px solid var(--error);color:var(--error);display:block;}
  .prevnext{display:flex;justify-content:space-between;margin-top:26px;}
  .prevnext button{background:transparent;border:1px solid var(--brass);color:var(--brass);
    padding:9px 16px;border-radius:3px;font-size:0.8rem;cursor:pointer;}
  .progress-line{font-size:0.7rem;color:var(--line-dim);margin-top:4px;}
  footer{text-align:center;font-size:0.66rem;color:var(--line-dim);padding:20px;border-top:1px solid rgba(234,244,255,0.15);}
  @media (min-width:640px){ h1{font-size:1.25rem;} .module h2{font-size:1.45rem;} }
</style>

<script>
/* ============ PLOTTING HELPER ============ */
function drawPlot(canvas, opts){
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 320;
  const cssH = 200;
  canvas.width = cssW * dpr; canvas.height = cssH * dpr;
  canvas.style.height = cssH + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0,0,cssW,cssH);
  const {xMin, xMax, yMin, yMax, curves = []} = opts;
  const padL = 34, padB = 22, padT = 10, padR = 10;
  const plotW = cssW - padL - padR, plotH = cssH - padT - padB;
  function toPx(x, y){
    const px = padL + ((x - xMin) / (xMax - xMin)) * plotW;
    const py = padT + plotH - ((y - yMin) / (yMax - yMin)) * plotH;
    return [px, py];
  }
  ctx.strokeStyle = "#8fa9bd"; ctx.lineWidth = 1; ctx.beginPath();
  const [x0] = toPx(0,0); const [,y0] = toPx(0,0);
  if (x0 >= padL && x0 <= cssW-padR){ ctx.moveTo(x0, padT); ctx.lineTo(x0, padT+plotH); }
  if (y0 >= padT && y0 <= cssH-padB){ ctx.moveTo(padL, y0); ctx.lineTo(padL+plotW, y0); }
  ctx.stroke();
  ctx.strokeStyle = "#c3d3e0"; ctx.strokeRect(padL, padT, plotW, plotH);
  curves.forEach(c => {
    ctx.strokeStyle = c.color || "#1a3c5e"; ctx.lineWidth = c.width || 2; ctx.beginPath();
    const steps = 100;
    for (let i=0;i<=steps;i++){
      const x = xMin + (xMax - xMin) * (i/steps);
      const y = c.fn(x);
      const [px,py] = toPx(x,y);
      if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.stroke();
  });
  ctx.fillStyle = "#4a6478"; ctx.font = "10px monospace";
  ctx.fillText(xMin.toFixed(0), padL, cssH-6);
  ctx.fillText(xMax.toFixed(0), cssW-padR-16, cssH-6);
  ctx.fillText(yMax.toFixed(0), 2, padT+8);
  ctx.fillText(yMin.toFixed(0), 2, cssH-padB);
}

/* ============ MODULE DATA — full ME curriculum ============ */
const MODULES = [
{ id:"mee101", cat:"Foundations", title:"Intro to Mechanical Engineering", tag:"MEE 101 · 1 Unit",
  concept:"Mechanical engineering applies science to build things that work — it sits between pure science (why things happen) and technology (the tools that result). Every ME course you'll meet feeds into designing real machines: engines, structures, and systems.",

  why:"Seeing how branches connect early helps you place every later course (thermo, statics, materials) into one mental map instead of treating them as unrelated subjects.",
  exercises:[
    {type:"mc", id:"mee101_1", q:"Which best separates science from engineering?", options:["Science discovers natural laws; engineering applies them to build solutions","They are identical","Science is only about machines","Engineering has no theory"], correct:0, explain:"Science explains; engineering builds using that explanation."},
    {type:"mc", id:"mee101_2", q:"Which of these is NOT a core branch of mechanical engineering in this curriculum?", options:["Thermodynamics","Strength of Materials","Applied Mechanics","Corporate Law"], correct:3, explain:"Corporate law isn't a mechanical engineering discipline."}
  ]
},
{ id:"get209", cat:"Mathematics", title:"Engineering Mathematics I", tag:"GET 209 · 3 Units",

  example:{label:"Worked example", lines:["Volume under z = xy over the unit square:","∫₀¹∫₀¹ xy dx dy","Inner integral (treat y as constant): x²y/2 from 0 to 1 = y/2","Outer integral: ∫₀¹ y/2 dy = 1/4"]},
  why:"You can integrate one variable at a time because, for constant limits, each integral only 'sees' its own variable — the other is just a constant multiplier at that stage.",
  exercises:[

    {type:"mc", id:"get209_2", q:"The partial derivative of f(x,y)=x²y with respect to x is:", options:["2xy","x²","2x","y²"], correct:0, explain:"Treat y as a constant and differentiate x² → 2x, then keep the y factor: 2xy."}
  ]
},
{ id:"get210", cat:"Mathematics", title:"Engineering Mathematics II", tag:"GET 210 · 3 Units",
  concept:"ODEs model change over time, as before. Complex numbers (x + iy treated as one object, z) let you solve 2-D field problems — fluid flow, electrical fields — with one equation instead of two. A function is 'analytic' when it satisfies the Cauchy-Riemann equations everywhere in a region.",
  example:{label:"Worked example — Cauchy-Riemann check", lines:["f(z) = z² → u = x² − y², v = 2xy","∂u/∂x = 2x, ∂v/∂y = 2x → equal ✓","∂u/∂y = −2y, −∂v/∂x = −2y → equal ✓","f(z) = z² is analytic everywhere."]},
  why:"Analytic functions behave predictably under differentiation and integration, which is why they unlock conformal mapping for solving real 2-D engineering fields.",
  exercises:[
    {type:"mc", id:"get210_1", q:"A complex function satisfying the Cauchy-Riemann equations everywhere is called:", options:["continuous","analytic","discrete","irrational"], correct:1, explain:"This is the definition of an analytic (holomorphic) function."},
    {type:"input", id:"get210_2", q:"For f(z)=z², u(x,y)=x²−y². Find u at x=3, y=2.", answer:5, explain:"3² − 2² = 9 − 4 = 5."}
  ]
},
{ id:"get301", cat:"Mathematics", title:"Engineering Mathematics III", tag:"GET 301 · 3 Units",
  concept:"Matrices and tensors describe how a system responds in every direction at once. An eigenvector is a direction a transformation doesn't rotate — it only stretches it by a factor called the eigenvalue. This is exactly how engineers find principal stresses and natural vibration modes.",
  example:{label:"Worked example", lines:["Matrix [[2,0],[0,3]] stretches x by 2 and y by 3.", "Eigenvalues: 2 and 3.", "Eigenvectors: along the x-axis and y-axis — each axis is stretched independently, not rotated."]},
  why:"Because the matrix is diagonal, each axis is already an eigenvector — this is the simplest case and shows exactly what 'stretch without rotation' means before tackling non-diagonal matrices.",
  exercises:[

    {type:"mc", id:"get301_2", q:"Eigenvectors represent:", options:["Directions whose orientation is unchanged by a transformation","Random vectors","A concept only used in statistics","Imaginary numbers"], correct:0, explain:"They may stretch or shrink, but they keep pointing the same way (or exactly opposite)."}
  ]

{ id:"get302", cat:"Mathematics", title:"Engineering Mathematics IV", tag:"GET 302 · 3 Units",
  concept:"When an ODE is too irregular for an exact formula (like Bessel's equation), you solve it as an infinite power series instead. When no formula exists at all, numerical methods like Runge-Kutta step forward in small increments, trading perfect precision for a computable approximate answer.",
  example:{label:"Worked example — Euler step (simplified Runge-Kutta idea)", lines:["dy/dx = y, y(0) = 1, step Δx = 0.1", "y(0.1) ≈ y(0) + 0.1 · f(0, y(0)) = 1 + 0.1(1) = 1.1", "Runge-Kutta improves this by averaging slopes across the step."]},

{ id:"get106", cat:"Probability & Stats", title:"Probability I", tag:"GET 106 · 3 Units",
  concept:"Probability is the fraction of times an outcome would occur if you repeated an experiment endlessly. Permutations count ordered arrangements; combinations count selections where order doesn't matter — engineers use both to model failure rates and risk.",

    {type:"input", id:"get106_2", q:"How many ways can you arrange 3 items from 5 in order (permutation)?", answer:60, explain:"P(5,3) = 5×4×3 = 60."}
  ]
},
{ id:"get305", cat:"Probability & Stats", title:"Engineering Statistics & Data Analytics", tag:"GET 305 · 3 Units",
  concept:"Descriptive statistics summarize a dataset with a few numbers (mean, spread). Regression fits the best straight line through data so you can predict one variable from another — this is how raw sensor or experiment data becomes an engineering decision.",
  example:{label:"Worked example", lines:["Data pairs: (1,2), (2,4), (3,6)", "Points are perfectly linear with slope 2", "Fitted line: y = 2x — use it to predict future readings"]},

{ id:"phy101", cat:"Physics & Mechanics", title:"General Physics I — Mechanics", tag:"PHY 101 · 2 Units",
  concept:"Newton's three laws predict every mechanical motion problem: (1) an object keeps its motion unless a net force acts on it, (2) acceleration equals net force divided by mass (F = ma), (3) every force has an equal, opposite reaction force.",

/* ============ STATE & PERSISTENCE ============ */
const STORAGE_KEY = "me_curriculum_progress_v1";
function loadProgress(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : {}; }catch(e){ return {}; }
}
function saveProgress(p){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }catch(e){} }
let progress = loadProgress();

function totalExercises(){ return MODULES.reduce((n,m)=>n+m.exercises.length, 0); }
function completedCount(){ return Object.values(progress).filter(Boolean).length; }
function rankFor(pct){
  if (pct >= 75) return "Expert";
  if (pct >= 50) return "Advanced";
  if (pct >= 25) return "Intermediate";
  return "Beginner";
}

const CATEGORIES = ["All", ...Array.from(new Set(MODULES.map(m=>m.cat)))];
let activeCat = "All";
let currentIndex = 0;

function visibleModules(){
  return activeCat === "All" ? MODULES : MODULES.filter(m=>m.cat===activeCat);
}

/* ============ RENDER ============ */
function renderCatBar(){
  const bar = document.getElementById("catBar");
  bar.innerHTML = "";
  CATEGORIES.forEach(cat=>{
    const btn = document.createElement("button");
    btn.textContent = cat;
    if (cat === activeCat) btn.classList.add("activeCat");
    btn.onclick = ()=>{
      activeCat = cat;
      const vis = visibleModules();
      const stillVisible = vis.some(m=>MODULES.indexOf(m)===currentIndex);
      if (!stillVisible && vis.length) currentIndex = MODULES.indexOf(vis[0]);
      renderAll();
    };
    bar.appendChild(btn);
  });
}

function renderNav(){
  const nav = document.getElementById("moduleNav");
  nav.innerHTML = "";
  visibleModules().forEach(m=>{
    const i = MODULES.indexOf(m);
    const btn = document.createElement("button");
    btn.textContent = m.title;
    if (i === currentIndex) btn.classList.add("active");
    const done = m.exercises.every(ex => progress[ex.id]);
    if (done) btn.classList.add("done");
    btn.onclick = ()=>{ currentIndex = i; renderAll(); };
    nav.appendChild(btn);
  });
}

function renderModule(m, idx){
  const sec = document.createElement("section");
  sec.className = "module active";
  sec.id = "mod-"+m.id;
  const doneCount = m.exercises.filter(ex=>progress[ex.id]).length;

  let html = `
    <div class="tag">${m.tag}</div>
    <h2>${m.title}</h2>
    <div class="concept"><b>In short:</b> ${m.concept}</div>
    <div class="example">
      <div class="label">${m.example.label}</div>
      ${m.example.lines.map(l=>`<span class="math">${l}</span>`).join("")}
    </div>
  `;
  if (m.plot) html += `<canvas class="plot" id="plot-${m.id}"></canvas>`;
  if (m.why) html += `<div class="why">Why: ${m.why}</div>`;
  html += `<div class="progress-line">Exercises completed: ${doneCount} / ${m.exercises.length}</div>`;

  m.exercises.forEach(ex=>{
    html += `<div class="exercise" id="ex-${ex.id}"><div class="q">${ex.q}</div>`;
    if (ex.type === "input"){
      html += `<input type="text" inputmode="decimal" id="input-${ex.id}" placeholder="answer"><button class="submit-btn" data-check="${ex.id}">Check</button>`;
    } else if (ex.type === "mc"){
      ex.options.forEach((opt, oi)=>{
        html += `<button class="opt-btn" data-mc="${ex.id}" data-idx="${oi}">${opt}</button>`;
      });
    }
    html += `<div class="feedback" id="fb-${ex.id}"></div></div>`;
  });

  const vis = visibleModules();
  const visIdx = vis.indexOf(m);
  html += `<div class="prevnext">
    <button id="prevBtn" ${visIdx===0?"disabled style='opacity:0.35'":""}>← Previous</button>
    <button id="nextBtn" ${visIdx===vis.length-1?"disabled style='opacity:0.35'":""}>Next →</button>
  </div>`;

  sec.innerHTML = html;
  return sec;
}

function attachHandlers(m){
  m.exercises.forEach(ex=>{
    if (ex.type === "input"){
      const btn = document.querySelector(`[data-check="${ex.id}"]`);
      btn.addEventListener("click", ()=>{
        const val = document.getElementById("input-"+ex.id).value.trim();
        const num = parseFloat(val);
        const tol = ex.tol !== undefined ? ex.tol : 0.01;
        const fb = document.getElementById("fb-"+ex.id);
        if (!isNaN(num) && Math.abs(num - ex.answer) <= tol){
          fb.className = "feedback correct"; fb.textContent = "Correct. " + ex.explain; markDone(ex.id);
        } else {
          fb.className = "feedback incorrect"; fb.textContent = "Not quite. " + ex.explain;
        }
      });
    } else if (ex.type === "mc"){
      document.querySelectorAll(`[data-mc="${ex.id}"]`).forEach(b=>{
        b.addEventListener("click", ()=>{
          const idx = parseInt(b.getAttribute("data-idx"));
          const fb = document.getElementById("fb-"+ex.id);
          if (idx === ex.correct){
            fb.className = "feedback correct"; fb.textContent = "Correct. " + ex.explain; markDone(ex.id);
          } else {
            fb.className = "feedback incorrect"; fb.textContent = "Not quite. " + ex.explain;
          }
        });
      });
    }
  });

  const vis = visibleModules();
  const visIdx = vis.indexOf(m);
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  if (prevBtn) prevBtn.addEventListener("click", ()=>{ if(visIdx>0){ currentIndex = MODULES.indexOf(vis[visIdx-1]); renderAll(); window.scrollTo(0,0);} });
  if (nextBtn) nextBtn.addEventListener("click", ()=>{ if(visIdx<vis.length-1){ currentIndex = MODULES.indexOf(vis[visIdx+1]); renderAll(); window.scrollTo(0,0);} });

  if (m.plot){ const canvas = document.getElementById("plot-"+m.id); if (canvas) drawPlot(canvas, m.plot); }
}

function markDone(exId){
  if (!progress[exId]){
    progress[exId] = true; saveProgress(progress); updateGauge(true); renderNav();
  }
}

function updateGauge(bump){
  const total = totalExercises(); const done = completedCount();
  const pct = total ? Math.round((done/total)*100) : 0;
  const dial = document.getElementById("dial");
  dial.style.setProperty("--pct", pct);
  document.getElementById("dialPct").textContent = pct + "%";
  const seal = document.getElementById("rankSeal");
  const rank = rankFor(pct);
  const changed = seal.textContent.trim().toUpperCase() !== rank.toUpperCase();
  seal.textContent = rank;
  if (bump && changed){ seal.classList.remove("bump"); void seal.offsetWidth; seal.classList.add("bump"); }
}

function renderAll(){
  renderCatBar();
  renderNav();
  const main = document.getElementById("main");
  main.innerHTML = "";
  const sec = renderModule(MODULES[currentIndex], currentIndex);
  main.appendChild(sec);
  attachHandlers(MODULES[currentIndex]);
  updateGauge(false);
}

renderAll();

/* ============ PWA: register service worker for offline installability ============ */
if ("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{ /* offline first load without sw is still fine */ });
  });
}
</script>
